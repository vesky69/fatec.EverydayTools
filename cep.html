<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Formulário de cadastro com busca de CEP via API ViaCEP e armazenamento no LocalStorage" />
  <title>Aula 07 — Formulário com CEP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />

</head>

<body>

  <header class="page-header">
    <h1>Cadastro de Clientes</h1>
    <p>Preencha o formulário abaixo. Ao digitar o CEP, o endereço será preenchido automaticamente.</p>
  </header>

  <main class="container">
    <section class="form-section">
      <h2>Dados do Cadastro</h2>

      <form id="formRegister" novalidate>

        <!-- LINHA 1: CPF e Nome -->
        <div class="form-row">

          <div class="form-group form-group--small">
            <label for="cpf">CPF <span class="required">*</span></label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required />
          </div>

          <div class="form-group form-group--large">
            <label for="nome">Nome Completo <span class="required">*</span></label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required />
          </div>

        </div>
        <!-- /LINHA 1 -->

        <!-- LINHA 2: CEP + Logradouro + Número -->
        <div class="form-row">

          <div class="form-group form-group--small">
            <label for="cep">CEP <span class="required">*</span></label>
            <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9" required />
            <!-- Status da busca do CEP (preenchido pelo JS) -->
            <span id="cepStatus" class="field-status"></span>
          </div>

          <div class="form-group form-group--large">
            <label for="logradouro">Logradouro <span class="required">*</span></label>
            <input type="text" id="logradouro" name="logradouro" placeholder="Rua, Avenida, etc." required />
          </div>

          <div class="form-group form-group--tiny">
            <label for="numero">Nº <span class="required">*</span></label>
            <input type="text" id="numero" name="numero" placeholder="123" required />
          </div>

        </div>
        <!-- /LINHA 2 -->

        <!-- LINHA 3: Complemento -->
        <div class="form-row">

          <div class="form-group form-group--full">
            <label for="complemento">Complemento</label>
            <input type="text" id="complemento" name="complemento" placeholder="Apto, Bloco, Sala... (opcional)" />
          </div>

        </div>
        <!-- /LINHA 3 -->

        <!-- LINHA 4: Bairro, Cidade e Estado -->
        <div class="form-row">

          <div class="form-group">
            <label for="bairro">Bairro <span class="required">*</span></label>
            <input type="text" id="bairro" name="bairro" placeholder="Nome do bairro" required />
          </div>

          <div class="form-group">
            <label for="cidade">Cidade <span class="required">*</span></label>
            <input type="text" id="cidade" name="cidade" placeholder="Sua cidade" required />
          </div>

          <div class="form-group form-group--tiny">
            <label for="estado">UF <span class="required">*</span></label>
            <select id="estado" name="estado" required>
              <option value="">--</option>
              <option value="AC">AC</option>
              <option value="AL">AL</option>
              <option value="AP">AP</option>
              <option value="AM">AM</option>
              <option value="BA">BA</option>
              <option value="CE">CE</option>
              <option value="DF">DF</option>
              <option value="ES">ES</option>
              <option value="GO">GO</option>
              <option value="MA">MA</option>
              <option value="MT">MT</option>
              <option value="MS">MS</option>
              <option value="MG">MG</option>
              <option value="PA">PA</option>
              <option value="PB">PB</option>
              <option value="PR">PR</option>
              <option value="PE">PE</option>
              <option value="PI">PI</option>
              <option value="RJ">RJ</option>
              <option value="RN">RN</option>
              <option value="RS">RS</option>
              <option value="RO">RO</option>
              <option value="RR">RR</option>
              <option value="SC">SC</option>
              <option value="SP">SP</option>
              <option value="SE">SE</option>
              <option value="TO">TO</option>
            </select>
          </div>

        </div>
        <!-- /LINHA 4 -->

        <div class="form-actions">
          <button type="button" id="btnLimpar" class="btn btn--secondary">Limpar</button>
          <button type="submit" id="btnSalvar" class="btn btn--primary">Salvar Cadastro</button>
        </div>

      </form>
    </section>

    <section class="table-section">
      <h2>Registros Salvos</h2>

      <p id="emptyMessage" class="empty-message">
        Nenhum registro cadastrado ainda.
      </p>

      <div class="table-wrapper" id="tableWrapper" hidden>
        <table id="tabelaRegistros">
          <thead>
            <tr>
              <th>CPF</th>
              <th>Nome</th>
              <th>CEP</th>
              <th>Endereço</th>
              <th>Bairro</th>
              <th>Cidade/UF</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="tableBody">
          </tbody>
        </table>
      </div>

    </section>
  </main>

  <script src="js/app.js"></script>

</body>

</html>

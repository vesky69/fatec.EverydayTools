<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everiday Tools</title>
</head>
<body>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">

    <header>
        <h1>Logo</h1>
        <nav class="btnHeader">
            <a href="#">
                <button title="Busca" <i class="fa-solid fa-magnifying-glass"></i></button> <!-- Função de busca -->
            </a>
            <a href="#">
                <button title="Mode" <i class="fa-solid fa-circle-half-stroke"></i></button> <!-- Função dark e light mode Dark-->
                <!-- DARK MODE:
                --bg-main: #0f172a; fundo geral
                --bg-secondary: #1e293b; section
                --bg-soft: #334155; hover
                --hover: #475569; hover
                --text: #f1f5f9; textos
                --accent: #38bdf8; azulzinho -->
            </a>
            <a href="#">
                <button title="Idioma" <i class="fa-solid fa-language"></i></button> <!-- Função de Idioma pt-BR e en -->
            </a>
            <a href="#">
                <button title="Menu" <i class="fa-solid fa-bars"></i></button> <!-- Função de busca por categorias -->
            </a>
            <a href="#">
                <button title="Login" <i class="fa-regular fa-user"></i></button> <!-- Função login, logout e cadastro -->
            </a>
        </nav>
    </header>

    <main>
        <section class="introduction">
            <h1>Bem-vindo(a) ao Everyday Tools</h1>
            <p>Use calculadoras e ferramentas do dia a dia.</p>
        </section>

        <section class="container">
            <h1>Ferramentas</h1>
            <div class="cards">
                <a href="imc.html" class="card">
                    <div>
                        <h3>IMC</h3>
                        <p>Calcule seu IMC.</p>
                    </div>
                </a>
                <a href="salary.html" class="card">
                    <div>
                        <h3>Calculadora de salário</h3>
                        <p>Calcule seu INSS, IRRF e salário líquido com base no seu regime de trabalho.</p>
                    </div>
                </a>
                <a href="cep.html" class="card">
                    <div>
                        <h3>Busca de CEP</h3>
                        <p>Busque um endereço a partir do CEP.</p>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <!-- <footer>  
        <p>© 2026 - Meu Site</p>
    </footer> -->

    <script src="js/app.js"></script>
</body>
</html>
